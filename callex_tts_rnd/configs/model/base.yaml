# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CALLEX TTS — Base Model Hyperparameters                           ║
# ║  All model configs inherit from this. Override in language YAMLs.  ║
# ╚══════════════════════════════════════════════════════════════════════╝

model:
  name: "callex-vits2"
  version: "2.0"

  # ── Text Encoder ──
  encoder:
    vocab_size: 256          # Phoneme vocabulary size (auto-adjusted at runtime)
    hidden_channels: 192     # Core hidden dimension
    filter_channels: 768     # FFN intermediate dimension
    n_heads: 2               # Multi-head attention heads
    n_layers: 6              # Transformer depth
    kernel_size: 3           # Conv1d kernel in FFN blocks
    dropout: 0.1
    use_rope: true           # Rotary Position Embeddings

  # ── Stochastic Duration Predictor ──
  duration_predictor:
    filter_channels: 256
    kernel_size: 3
    dropout: 0.5
    n_flows: 4               # Number of flow layers
    gin_channels: 0          # Speaker conditioning channels (0 = single speaker)

  # ── Posterior Encoder ──
  posterior_encoder:
    in_channels: 80          # Mel bands
    hidden_channels: 192
    out_channels: 192
    kernel_size: 5
    dilation_rate: 1
    n_layers: 16             # WaveNet depth

  # ── Normalizing Flow ──
  flow:
    hidden_channels: 192
    kernel_size: 5
    dilation_rate: 1
    n_layers: 4
    n_flows: 4               # Number of coupling layers

  # ── HiFi-GAN v2 Vocoder ──
  vocoder:
    initial_channels: 192
    resblock_type: "2"       # "1" = ResBlock1, "2" = ResBlock2
    upsample_rates: [8, 8, 2, 2]
    upsample_initial_channel: 512
    upsample_kernel_sizes: [16, 16, 4, 4]
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    use_snake_activation: true

  # ── Discriminators ──
  discriminator:
    mpd:
      periods: [2, 3, 5, 7, 11]
      use_spectral_norm: false
    msd:
      use_spectral_norm: true
    mrd:
      resolutions: [[1024, 120, 600], [2048, 240, 1200], [512, 50, 240]]
      # Each: [n_fft, hop_length, win_length]

# ── Audio Feature Extraction ──
audio:
  sample_rate: 24000
  output_sample_rate: 16000   # Telephony downsampled output
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  fmin: 0
  fmax: 8000
  mel_scale: "slaney"
  norm: "slaney"
  clip_val: 1.0e-5

# ── Audio Post-Processing Chain ──
postprocessing:
  enabled: true

  # Dynamic range compressor
  compressor:
    enabled: true
    threshold_db: -20.0
    ratio: 4.0
    attack_ms: 5.0
    release_ms: 50.0
    makeup_gain_db: 4.0

  # Peak limiter
  limiter:
    enabled: true
    ceiling_db: -1.0

  # Noise gate
  noise_gate:
    enabled: true
    threshold_db: -45.0
    attack_ms: 1.0
    release_ms: 20.0

  # De-esser
  deesser:
    enabled: true
    frequency_hz: 6000
    threshold_db: -15.0
    ratio: 3.0

  # Warmth filter (low-shelf boost)
  warmth:
    enabled: true
    frequency_hz: 200
    gain_db: 2.0

  # Loudness normalization (EBU R128)
  loudness:
    enabled: true
    target_lufs: -16.0
