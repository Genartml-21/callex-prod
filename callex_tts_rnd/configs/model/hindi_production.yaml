# ╔══════════════════════════════════════════════════════════════════════╗
# ║  CALLEX TTS — Hindi Production Model Override                      ║
# ║  Inherits from base.yaml, tunes for hi-IN telephony deployment.    ║
# ╚══════════════════════════════════════════════════════════════════════╝

defaults:
  - base

model:
  name: "callex-vits2-hi"

  encoder:
    vocab_size: 196          # Hindi phoneme set (Devanagari + IPA + punctuation)
    n_layers: 6
    use_rope: true

  duration_predictor:
    # Hindi has complex syllable structure — wider kernels capture conjuncts
    kernel_size: 5

  vocoder:
    # Tuned for Indian female voice timbre
    use_snake_activation: true

audio:
  sample_rate: 24000
  output_sample_rate: 16000  # 16kHz mono PCM for telephony (FreeSWITCH)
  n_mels: 80
  fmax: 8000                 # Telephony bandwidth limit

# ── Hindi-Specific Text Processing ──
text:
  language: "hi"
  script: "Devanagari"
  
  normalizer:
    expand_numbers: true
    expand_currency: true
    apply_schwa_deletion: true
    handle_code_switching: true   # Hindi-English mixed text
    apply_sandhi_rules: true      # Vowel/consonant sandhi
    normalize_nukta: true
    expand_abbreviations: true

  phonemizer:
    backend: "epitran"           # epitran | espeak
    language_code: "hin-Deva"
    preserve_punctuation: true
    with_stress: false

# ── Post-Processing Tuned for Telephony ──
postprocessing:
  enabled: true

  compressor:
    enabled: true
    threshold_db: -18.0          # Slightly more aggressive for phone lines
    ratio: 5.0
    makeup_gain_db: 5.0

  warmth:
    enabled: true
    frequency_hz: 250            # Warmer low-end for female Hindi voice
    gain_db: 3.0

  loudness:
    enabled: true
    target_lufs: -14.0           # Louder for noisy phone environments
